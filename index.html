<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inventaris Batch</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #333; color: white; }
        .sticky-tools { position: sticky; top: 0; background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; gap: 10px; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input[type="number"] { width: 80px; padding: 5px; }
        button { cursor: pointer; border: none; padding: 10px 20px; color: white; border-radius: 4px; font-weight: bold; }
        .btn-depo { background: #27ae60; }
        .btn-with { background: #c0392b; }
        .loading { color: orange; font-weight: bold; }
        body {
    font-family: sans-serif;
    padding: 20px;
    /* Tambahkan baris di bawah ini */
    background-image: url('rex.jpg');
    background-size: cover;
    background-attachment: fixed;
    background-position: center;
}
    </style>
</head>
<body>

    <h2>DATABASE INVENTARIS (BATCH MODE)</h2>
    
    <div class="sticky-tools">
        <button class="btn-depo" onclick="submitBatch('deposit')">DEPOSIT SEMUA</button>
        <button class="btn-with" onclick="submitBatch('withdraw')">WITHDRAW SEMUA</button>
        <div id="status">Memuat data...</div>
    </div>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Nama Barang</th>
                <th>Kode</th>
                <th>Stok Saat Ini</th>
                <th>Jumlah Input</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbziBd051J_ZwY5TNsKlYuCHB6LYaKOW8KWQawdBm7DbnAy2t703WEjskaIZ5M-ls2QurA/exec"; // Masukkan URL Deploy baru Anda di sini
        let itemCodes = [];

        async function loadData() {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            itemCodes = [];
            
            for (let i = 1; i < data.length; i++) {
                const kode = data[i][1];
                itemCodes.push(kode);
                const row = `<tr>
                    <td>${data[i][3]}</td>
                    <td>${kode}</td>
                    <td><b>${data[i][4]}</b></td>
                    <td><input type="number" id="input-${kode}" placeholder="0" min="0"></td>
                </tr>`;
                tableBody.innerHTML += row;
            }
            document.getElementById('status').innerText = "Data Siap";
        }

        async function submitBatch(aksi) {
            const itemsToProcess = [];
            
            itemCodes.forEach(kode => {
                const val = document.getElementById(`input-${kode}`).value;
                if (val && parseInt(val) > 0) {
                    itemsToProcess.push({ kode: kode, jumlah: parseInt(val) });
                }
            });

            if (itemsToProcess.length === 0) return alert("Isi minimal satu jumlah barang!");

            document.getElementById('status').innerText = "Sedang Memproses " + itemsToProcess.length + " item...";
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ aksi: aksi, items: itemsToProcess })
                });
                const result = await response.text();
                alert(result);
                loadData(); 
            } catch (error) {
                alert("Gagal koneksi ke database");
            }
        }

        loadData();
    </script>
</body>
</html>
