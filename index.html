<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inventaris Interaktif</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #333; color: white; }
        .controls { display: flex; gap: 10px; align-items: center; }
        input[type="number"] { width: 60px; padding: 5px; }
        button { cursor: pointer; border: none; padding: 8px 12px; color: white; border-radius: 4px; }
        .btn-depo { background: #27ae60; }
        .btn-with { background: #c0392b; }
        .loading { color: orange; font-weight: bold; }
    </style>
</head>
<body>

    <h2>DATABASE INVENTARIS</h2>
    <div id="status">Memuat data...</div>
    
    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Nama Barang</th>
                <th>Kode</th>
                <th>Stok</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data akan muncul di sini secara otomatis -->
        </tbody>
    </table>

    <script>
        // GANTI URL DI BAWAH INI DENGAN URL WEB APP YANG ANDA SIMPAN TADI
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHIdL4iIk9nFyCPOUt4JXcp8A9RCOV3elt-EO5n1GlQ4OXTzIgD-TC3lSqocd2uU05mw/exec";

        async function loadData() {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            // Mulai dari baris ke-2 (index 1) untuk melewati header
            for (let i = 1; i < data.length; i++) {
                const row = `<tr>
                    <td>${data[i][3]}</td>
                    <td>${data[i][1]}</td>
                    <td id="stok-${data[i][1]}">${data[i][4]}</td>
                    <td>
                        <div class="controls">
                            <input type="number" id="input-${data[i][1]}" value="1" min="1">
                            <button class="btn-depo" onclick="updateStok('${data[i][1]}', 'deposit')">Deposit</button>
                            <button class="btn-with" onclick="updateStok('${data[i][1]}', 'withdraw')">Withdraw</button>
                        </div>
                    </td>
                </tr>`;
                tableBody.innerHTML += row;
            }
            document.getElementById('status').innerText = "Data Terkini";
        }

        async function updateStok(kode, aksi) {
            const jumlah = document.getElementById(`input-${kode}`).value;
            const statusDiv = document.getElementById('status');
            
            statusDiv.className = 'loading';
            statusDiv.innerText = "Sedang memproses...";

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ kode: kode, jumlah: jumlah, aksi: aksi })
                });
                const result = await response.text();
                alert(result);
                loadData(); // Refresh data setelah update
            } catch (error) {
                alert("Terjadi kesalahan koneksi");
            }
        }

        loadData();
    </script>
</body>
</html>
